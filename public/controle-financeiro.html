function renderEntradasCard(card, t) {
  // Header hint
  const hint = document.createElement('div');
  hint.style.cssText = 'padding:6px 14px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)';
  hint.textContent = 'Clique no perfil para incluir ou excluir do total de Entradas.';
  card.appendChild(hint);

  const wrap = document.createElement('div'); wrap.className = 'table-wrap';
  const table = document.createElement('table');
  table.innerHTML = `<thead><tr><th>Perfil</th><th>Saldo Final</th><th style="width:60px;text-align:center">Incluir</th></tr></thead>`;
  const tbody = document.createElement('tbody');

  let total = 0;

  getActiveProfiles().forEach(({ name, idx }) => {
    const included = state.entradasProfiles[idx] !== false;

    // Compute saldo for this profile
    const rws = getAllRowsByProfile(idx);
    const tg = rws.reduce((s, r) => s + (parseFloat(r.value) || 0), 0);
    const pays = state.payments.filter(p => p.profileIdx === idx);
    const tp = pays.reduce((s, p) => s + p.value, 0);
    const saldo = (tp - tg) * -1;

    if (included) total += saldo;

    const dot = `<span style="width:8px;height:8px;border-radius:50%;background:${getProfileColor(idx)};display:inline-block;margin-right:8px;vertical-align:middle;"></span>`;
    const cls = saldo >= 0 ? 'positive' : 'negative';
    const sign = saldo >= 0 ? '+' : '';

    const tr = document.createElement('tr');
    tr.style.opacity = included ? '1' : '0.4';
    tr.style.transition = 'opacity .15s';

    const tdName = document.createElement('td');
    tdName.innerHTML = `${dot}${name}`;
    tdName.style.cursor = 'pointer';
    tdName.title = included ? 'Clique para excluir' : 'Clique para incluir';

    const tdVal = document.createElement('td');
    tdVal.className = `val-cell ${cls}`;
    tdVal.textContent = `${sign}${fmt(saldo)}`;

    const tdToggle = document.createElement('td');
    tdToggle.style.textAlign = 'center';
    const toggle = document.createElement('button');
    toggle.className = 'btn btn-sm';
    toggle.style.cssText = `padding:2px 8px;font-size:11px;font-weight:600;${included
      ? 'color:var(--accent2);border:1px solid var(--accent2);background:rgba(90,122,92,.12)'
      : 'color:var(--muted);border:1px solid var(--border)'}`;
    toggle.textContent = included ? '✓' : '○';
    toggle.title = included ? 'Excluir das Entradas' : 'Incluir nas Entradas';

    const toggleFn = () => {
      state.entradasProfiles[idx] = !included;
      saveState();
      renderBalanco();
    };

    toggle.onclick = toggleFn;
    tdName.onclick = toggleFn;

    tdToggle.appendChild(toggle);
    tr.append(tdName, tdVal, tdToggle);
    tbody.appendChild(tr);
  });

  if (getActiveProfiles().length === 0) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty">Nenhum perfil cadastrado.</div></td></tr>`;
  }

  const tfoot = document.createElement('tfoot');
  const cls = total >= 0 ? 'positive' : 'negative';
  tfoot.innerHTML = `<tr><td colspan="2">Total incluído</td><td class="val-cell ${cls}" style="text-align:right">${total >= 0 ? '+' : ''}${fmt(total)}</td></tr>`;
  table.append(tbody, tfoot);
  wrap.appendChild(table);
  card.appendChild(wrap);
}

function renderLancamentosCard(card, t) {
  // Find referencia table
  const refTable = state.balancoTables.find(tb => tb.id === (t.refTableId || 'referencia'));
  const refRows = refTable ? refTable.rows : [];
  const valColId = refTable ? (refTable.columns.find(c => c.type === 'number') || {}).id : null;
  const nameColId = refTable ? (refTable.columns.find(c => c.type === 'text') || {}).id : null;

  const lastProfileIdx = state.profiles.length - 1;
  const profRows = getAllRowsByProfile(lastProfileIdx);
  const spentByCategory = {};
  profRows.forEach(r => {
    const cat = r.category || 'Outros';
    spentByCategory[cat] = (spentByCategory[cat] || 0) + (parseFloat(r.value) || 0);
  });

  const wrap = document.createElement('div'); wrap.className = 'table-wrap';
  const table = document.createElement('table');
  table.innerHTML = `<thead><tr><th>Categoria</th><th>Referência</th><th>Gasto (Último Perfil)</th><th>Restante</th></tr></thead>`;
  const tbody = document.createElement('tbody');
  let totalRef = 0, totalSpent = 0, totalRestante = 0;

  refRows.forEach(row => {
    const catName = nameColId ? (row.values[nameColId] || '') : '';
    const refVal = valColId ? (parseFloat(row.values[valColId]) || 0) : 0;
    const spent = spentByCategory[catName] || 0;
    const restante = refVal - spent;
    totalRef += refVal; totalSpent += spent; totalRestante += restante;
    const restCls = restante > 0 ? 'lancamento-diff-positive' : restante < 0 ? 'lancamento-diff-negative' : 'lancamento-diff-neutral';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${catName}</td>
      <td class="val-cell">${fmt(refVal)}</td>
      <td class="val-cell negative">${spent > 0 ? '− ' + fmt(spent) : '—'}</td>
      <td class="val-cell ${restCls}">${restante !== 0 ? (restante > 0 ? '+' : '') + fmt(restante) : fmt(0)}</td>`;
    tbody.appendChild(tr);
  });

  const tfoot = document.createElement('tfoot');
  const restCls = totalRestante > 0 ? 'positive' : totalRestante < 0 ? 'negative' : '';
  tfoot.innerHTML = `<tr>
    <td>Totais</td>
    <td class="val-cell">${fmt(totalRef)}</td>
    <td class="val-cell negative">− ${fmt(totalSpent)}</td>
    <td class="val-cell ${restCls}">${totalRestante > 0 ? '+' : ''}${fmt(totalRestante)}</td>
  </tr>`;
  table.append(tbody, tfoot);
  wrap.appendChild(table);
  card.appendChild(wrap);
}

function renderCustomCard(card, t) {
  // Column header editor
  const colEditor = document.createElement('div');
  colEditor.style.cssText = 'display:flex;gap:6px;padding:8px 12px 4px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap';
  t.columns.forEach((col, ci) => {
    const colWrap = document.createElement('div');
    colWrap.style.cssText = 'display:flex;align-items:center;gap:3px;flex:1;min-width:80px;max-width:220px';

    const colNameInput = document.createElement('input');
    colNameInput.type = 'text'; colNameInput.value = col.name;
    colNameInput.style.cssText = 'background:transparent;border:none;border-bottom:1px dashed var(--border);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;width:100%;outline:none';
    colNameInput.oninput = e => { col.name = e.target.value; saveState(); };

    const typeToggle = document.createElement('button');
    typeToggle.className = 'btn btn-ghost btn-sm';
    typeToggle.style.cssText = 'padding:1px 4px;font-size:10px;opacity:.6';
    typeToggle.textContent = col.type === 'number' ? '#' : 'A';
    typeToggle.title = 'Alternar tipo (texto/número)';
    typeToggle.onclick = () => {
      col.type = col.type === 'number' ? 'text' : 'number';
      saveState(); renderBalanco();
    };

    const delColBtn = document.createElement('button');
    delColBtn.className = 'btn btn-danger btn-sm';
    delColBtn.style.cssText = 'padding:1px 5px;font-size:10px';
    delColBtn.textContent = '✕';
    delColBtn.onclick = () => removeTableColumn(t.id, col.id);

    colWrap.append(colNameInput, typeToggle, delColBtn);
    colEditor.appendChild(colWrap);
  });

  const addColBtn = document.createElement('button');
  addColBtn.className = 'btn btn-ghost btn-sm';
  addColBtn.style.cssText = 'padding:2px 8px;font-size:11px;opacity:.7';
  addColBtn.textContent = '+ Coluna';
  addColBtn.onclick = () => addTableColumn(t.id);
  colEditor.appendChild(addColBtn);
  card.appendChild(colEditor);

  // Data table
  const wrap = document.createElement('div'); wrap.className = 'table-wrap';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>${t.columns.map(c => `<th>${c.name}</th>`).join('')}<th></th></tr>`;
  const tbody = document.createElement('tbody');

  // Find first number column for total
  const numCol = t.columns.find(c => c.type === 'number');
  let total = 0;

  if (t.rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${t.columns.length + 1}"><div class="empty">Sem linhas. Adicione abaixo.</div></td></tr>`;
  } else {
    t.rows.forEach(row => {
      if (numCol) total += parseFloat(row.values[numCol.id]) || 0;
      const tr = document.createElement('tr');
      tr.className = 'balanco-editable-row';

      t.columns.forEach(col => {
        const td = document.createElement('td');
        const inp = document.createElement('input');
        inp.type = col.type === 'number' ? 'number' : 'text';
        inp.value = row.values[col.id] ?? '';
        inp.placeholder = col.type === 'number' ? '0,00' : col.name;
        inp.step = '0.01';
        inp.style.width = '100%';
        if (col.type === 'number') {
          inp.onblur = e => { row.values[col.id] = parseFloat(e.target.value) || 0; saveState(); renderBalanco(); };
        } else {
          inp.oninput = e => { row.values[col.id] = e.target.value; saveState(); };
        }
        td.appendChild(inp);
        tr.appendChild(td);
      });

      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm'; delBtn.innerHTML = '🗑';
      delBtn.onclick = () => removeTableRow(t.id, row.id);
      tdDel.appendChild(delBtn); tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });
  }

  const tfoot = document.createElement('tfoot');
  if (numCol) {
    tfoot.innerHTML = `<tr>
      <td colspan="${t.columns.indexOf(numCol)}" style="color:var(--muted);font-size:12px">Total</td>
      <td class="val-cell positive">${fmt(total)}</td>
      <td colspan="${t.columns.length - t.columns.indexOf(numCol)}"></td>
    </tr>`;
  }

  table.append(thead, tbody, tfoot);
  wrap.appendChild(table);
  card.appendChild(wrap);

  const addRowBtn = document.createElement('div');
  addRowBtn.className = 'balanco-add-btn';
  addRowBtn.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="addTableRow('${t.id}')">＋ Adicionar linha</button>`;
  card.appendChild(addRowBtn);
}

// ── SALDO BUILDER ──
// Track which tables are expanded in the saldo panel
const _saldoExpanded = {};

function renderSaldoBuilder() {
  const saldoEl = document.getElementById('balanco-saldo-row');
  if (!saldoEl) return;

  let saldoFinal = 0;
  saldoEl.innerHTML = '';

  state.balancoTables.forEach(t => {
    if (!t.includeInSaldo || t.sign === 0) return;
    const tableTotal = getTableTotal(t);
    saldoFinal += tableTotal * t.sign;
    const signLabel = t.sign === 1 ? '＋' : '−';
    const cls = t.sign === 1 ? 'positive' : 'negative';
    const isOpen = !!_saldoExpanded[t.id];

    // ── Header row (clickable to expand/collapse) ──
    const includedTables = state.balancoTables.filter(t => t.includeInSaldo && t.sign !== 0);
    const tIdx = includedTables.indexOf(t);

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s';
    header.onmouseenter = () => header.style.background = 'var(--surface2)';
    header.onmouseleave = () => header.style.background = '';

    const leftSide = document.createElement('span');
    leftSide.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)';

    // Move buttons (stop propagation so they don't toggle expand)
    const moveUp = document.createElement('button');
    moveUp.className = 'btn btn-ghost btn-sm';
    moveUp.innerHTML = '↑'; moveUp.style.cssText = 'padding:1px 5px;font-size:11px;opacity:.6';
    moveUp.disabled = tIdx === 0;
    moveUp.title = 'Mover para cima';
    moveUp.onclick = e => { e.stopPropagation(); moveBalancoTable(t.id, -1); };

    const moveDown = document.createElement('button');
    moveDown.className = 'btn btn-ghost btn-sm';
    moveDown.innerHTML = '↓'; moveDown.style.cssText = 'padding:1px 5px;font-size:11px;opacity:.6';
    moveDown.disabled = tIdx === includedTables.length - 1;
    moveDown.title = 'Mover para baixo';
    moveDown.onclick = e => { e.stopPropagation(); moveBalancoTable(t.id, 1); };

    leftSide.append(moveUp, moveDown);
    leftSide.innerHTML += `<span style="font-size:11px;opacity:.6">${isOpen ? '▾' : '▸'}</span>${signLabel} ${t.icon || ''} ${t.name}`;

    const rightSide = document.createElement('span');
    rightSide.className = `val-cell ${cls}`;
    rightSide.style.fontSize = '13px';
    rightSide.textContent = `${t.sign === 1 ? '+' : '− '}${fmt(tableTotal)}`;

    header.append(leftSide, rightSide);
    header.onclick = () => {
      _saldoExpanded[t.id] = !_saldoExpanded[t.id];
      renderSaldoBuilder();
    };
    saldoEl.appendChild(header);

    // ── Expandable body ──
    if (isOpen) {
      const body = document.createElement('div');
      body.style.cssText = 'border-bottom:1px solid var(--border);background:var(--surface2)';

      if (t.id === 'banco') {
        // Show banco account cards inline
        t.rows.forEach(row => {
          const rowEl = document.createElement('div');
          rowEl.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 22px;border-bottom:1px solid rgba(0,0,0,.06)';
          const nameInp = document.createElement('input');
          nameInp.type = 'text'; nameInp.value = row.values['nome'] || ''; nameInp.placeholder = 'Nome da conta';
          nameInp.style.cssText = 'flex:2;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit';
          nameInp.oninput = e => { row.values['nome'] = e.target.value; saveState(); };
          const valInp = document.createElement('input');
          valInp.type = 'number'; valInp.value = row.values['val'] || 0; valInp.placeholder = '0,00'; valInp.step = '0.01';
          valInp.style.cssText = 'flex:1;min-width:110px;max-width:170px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:14px;font-weight:700;color:var(--accent2);font-family:"JetBrains Mono",monospace';
          valInp.onblur = e => { row.values['val'] = parseFloat(e.target.value) || 0; saveState(); renderSaldoBuilder(); renderBalancoTables(); };
          const del = document.createElement('button');
          del.className = 'btn btn-danger btn-sm'; del.innerHTML = '🗑'; del.style.padding = '3px 7px';
          del.onclick = () => removeTableRow(t.id, row.id);
          rowEl.append(nameInp, valInp, del);
          body.appendChild(rowEl);
        });
        const addBar = document.createElement('div');
        addBar.style.cssText = 'padding:8px 22px';
        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-ghost btn-sm'; addBtn.textContent = '＋ Nova conta';
        addBtn.onclick = () => { t.rows.push({ id: genId(), values: { nome: '', val: 0 } }); saveState(); renderSaldoBuilder(); renderBalancoTables(); };
        addBar.appendChild(addBtn);
        body.appendChild(addBar);

      } else if (t.type === 'entradas') {
        // Show profiles with toggles
        getActiveProfiles().forEach(({ name, idx }) => {
          const included = state.entradasProfiles[idx] !== false;
          const rws = getAllRowsByProfile(idx);
          const tg = rws.reduce((s, r) => s + (parseFloat(r.value) || 0), 0);
          const pays = state.payments.filter(p => p.profileIdx === idx);
          const tp = pays.reduce((s, p) => s + p.value, 0);
          const saldo = (tp - tg) * -1;
          const dot = `<span style="width:8px;height:8px;border-radius:50%;background:${getProfileColor(idx)};display:inline-block;margin-right:8px;vertical-align:middle;flex-shrink:0"></span>`;
          const saldoCls = saldo >= 0 ? 'positive' : 'negative';

          const row = document.createElement('div');
          row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:7px 22px;border-bottom:1px solid rgba(0,0,0,.04);opacity:${included ? 1 : .4};cursor:pointer;transition:opacity .15s`;
          row.innerHTML = `<span style="font-size:13px">${dot}${name}</span><span class="val-cell ${saldoCls}" style="font-size:12px">${saldo >= 0 ? '+' : ''}${fmt(saldo)}</span>`;
          row.title = included ? 'Clique para excluir das Entradas' : 'Clique para incluir nas Entradas';
          row.onclick = () => { state.entradasProfiles[idx] = !included; saveState(); renderSaldoBuilder(); renderBalancoTables(); };
          body.appendChild(row);
        });

      } else if (t.type === 'custom') {
        // Editable table inline
        const numCol = t.columns.find(c => c.type === 'number');
        const textCols = t.columns.filter(c => c.type === 'text');

        if (t.rows.length === 0) {
          const empty = document.createElement('div');
          empty.style.cssText = 'padding:12px 22px;font-size:12px;color:var(--muted)';
          empty.textContent = 'Sem itens. Adicione abaixo.';
          body.appendChild(empty);
        } else {
          t.rows.forEach(row => {
            const rowEl = document.createElement('div');
            rowEl.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 18px;border-bottom:1px solid rgba(0,0,0,.04);flex-wrap:wrap';

            textCols.forEach(col => {
              const inp = document.createElement('input');
              inp.type = 'text'; inp.value = row.values[col.id] ?? ''; inp.placeholder = col.name;
              inp.style.cssText = 'flex:2;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit';
              inp.oninput = e => { row.values[col.id] = e.target.value; saveState(); };
              rowEl.appendChild(inp);
            });

            if (numCol) {
              const inp = document.createElement('input');
              inp.type = 'number'; inp.value = row.values[numCol.id] ?? 0; inp.placeholder = '0,00'; inp.step = '0.01';
              inp.style.cssText = 'flex:1;min-width:100px;max-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:13px;color:var(--text);font-family:inherit';
              inp.onblur = e => { row.values[numCol.id] = parseFloat(e.target.value) || 0; saveState(); renderSaldoBuilder(); renderBalancoTables(); };
              rowEl.appendChild(inp);
            }

            const del = document.createElement('button');
            del.className = 'btn btn-danger btn-sm'; del.innerHTML = '🗑'; del.style.padding = '3px 7px';
            del.onclick = () => removeTableRow(t.id, row.id);
            rowEl.appendChild(del);
            body.appendChild(rowEl);
          });
        }

        // Add row bar
        const addBar = document.createElement('div');
        addBar.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap';

        const newVals = {};
        const inputs = [];

        textCols.forEach(col => {
          const inp = document.createElement('input');
          inp.type = 'text'; inp.placeholder = col.name;
          inp.style.cssText = 'flex:2;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit';
          inp.oninput = e => { newVals[col.id] = e.target.value; };
          inputs.push(inp);
          addBar.appendChild(inp);
        });

        let numInp = null;
        if (numCol) {
          numInp = document.createElement('input');
          numInp.type = 'number'; numInp.placeholder = '0,00'; numInp.step = '0.01';
          numInp.style.cssText = 'flex:1;min-width:100px;max-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:13px;color:var(--text);font-family:inherit';
          numInp.oninput = e => { newVals[numCol.id] = parseFloat(e.target.value) || 0; };
          inputs.push(numInp);
          addBar.appendChild(numInp);
        }

        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-primary btn-sm'; addBtn.textContent = '＋ Adicionar';
        addBtn.onclick = () => {
          const row = { id: genId(), values: {} };
          t.columns.forEach(c => { row.values[c.id] = newVals[c.id] ?? (c.type === 'number' ? 0 : ''); });
          t.rows.push(row);
          saveState();
          renderSaldoBuilder();
          renderBalancoTables();
        };
        addBar.appendChild(addBtn);
        body.appendChild(addBar);
      }

      saldoEl.appendChild(body);
    }
  });

  const saldoCls = saldoFinal >= 0 ? 'positive' : 'negative';
  const saldoSign = saldoFinal >= 0 ? '+' : '';
  const saldoRow = document.createElement('div');
  saldoRow.className = 'saldo-row';
  saldoRow.innerHTML = `
    <span class="saldo-label">💡 SALDO DO MÊS</span>
    <span class="val-cell ${saldoCls}" style="font-size:20px;font-weight:700">${saldoSign}${fmt(saldoFinal)}</span>`;
  saldoEl.appendChild(saldoRow);
}



// ══════════════════════════════════════════════════════
//  PIX
// ══════════════════════════════════════════════════════
let _pixAddProfileIdx = null;

function addPix() {
  const dateEl = document.getElementById('pix-date');
  const descEl = document.getElementById('pix-desc');
  const valEl  = document.getElementById('pix-val');

  const date = dateEl.value;
  const desc = descEl.value.trim() || 'Pix';
  const value = parseFloat(valEl.value) || 0;

  if (value <= 0) { alert('Informe um valor válido.'); return; }

  state.pixRows.push({ id: genId(), date, desc, value, profileIdx: _pixAddProfileIdx });
  saveState();
  dateEl.value = '';
  descEl.value = '';
  valEl.value = '';
  renderPix();
}

function removePix(id) {
  state.pixRows = state.pixRows.filter(p => p.id !== id);
  saveState();
  renderPix();
}

function renderPix() {
  const tbody = document.getElementById('pix-tbody');
  const totalEl = document.getElementById('pix-total');
  if (!tbody) return;

  tbody.innerHTML = '';
  const total = state.pixRows.reduce((s, p) => s + p.value, 0);
  if (totalEl) totalEl.textContent = '− ' + fmt(total);

  // Render add-bar profile chips
  const chipsWrap = document.getElementById('pix-profile-chips');
  if (chipsWrap) {
    chipsWrap.innerHTML = '';
    const addChips = profileChips(_pixAddProfileIdx, newIdx => {
      _pixAddProfileIdx = _pixAddProfileIdx === newIdx ? null : newIdx;
      renderPix();
    });
    chipsWrap.appendChild(addChips);
  }

  if (state.pixRows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty">Nenhum Pix registrado.</div></td></tr>`;
    return;
  }

  state.pixRows.forEach(p => {
    const tr = document.createElement('tr');

    // Profile chips cell (inline, compact)
    const tdProfile = document.createElement('td');
    const rowChips = profileChips(p.profileIdx, newIdx => {
      p.profileIdx = p.profileIdx === newIdx ? null : newIdx;
      saveState();
      renderPix();
    });
    tdProfile.appendChild(rowChips);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger btn-sm';
    delBtn.innerHTML = '🗑';
    delBtn.onclick = () => removePix(p.id);
    const tdDel = document.createElement('td');
    tdDel.appendChild(delBtn);

    // Profile color dot for display
    const dotColor = p.profileIdx !== null ? getProfileColor(p.profileIdx) : '#ccc';
    const profileName = p.profileIdx !== null ? (state.profiles[p.profileIdx] || '—') : '—';
    const dot = `<span style="width:8px;height:8px;border-radius:50%;background:${dotColor};display:inline-block;margin-right:6px;vertical-align:middle;flex-shrink:0"></span>`;

    const tdDate = document.createElement('td');
    tdDate.textContent = p.date || '—';

    const tdDesc = document.createElement('td');
    tdDesc.textContent = p.desc;

    const tdVal = document.createElement('td');
    tdVal.className = 'val-cell negative';
    tdVal.textContent = `− ${fmt(p.value)}`;

    tr.append(tdDate, tdDesc, tdVal, tdProfile, tdDel);
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════════════════
//  FATURAS
// ══════════════════════════════════════════════════════
function addFatura() {
  state.faturas.push({ id: genId(), name: 'Fatura ' + (state.faturas.length+1), rows: [] });
  saveState();
  renderFaturas();
}

function removeFatura(fId) {
  if (!confirm('Remover esta fatura?')) return;
  state.faturas = state.faturas.filter(f => f.id !== fId);
  saveState();
  renderFaturas();
}

function addRow(fId) {
  const f = state.faturas.find(f => f.id === fId);
  f.rows.push({ id: genId(), date:'', name:'', parcelas:'', value:'', profileIdx: null, category: null });
  saveState();
  renderFaturas();
}

function removeRow(fId, rId) {
  const f = state.faturas.find(f => f.id === fId);
  f.rows = f.rows.filter(r => r.id !== rId);
  saveState();
  renderFaturas();
}

function updateRow(fId, rId, field, value) {
  const f = state.faturas.find(f => f.id === fId);
  const r = f.rows.find(r => r.id === rId);
  r[field] = value;
  saveState();
  updateFaturaTotal(fId);
}

function updateFaturaTotal(fId) {
  const f = state.faturas.find(f => f.id === fId);
  const total = f.rows.reduce((s,r) => s + (parseFloat(r.value)||0), 0);
  const el = document.getElementById('total-'+fId);
  if (el) el.textContent = fmt(total);
}

function renderFaturas() {
  const container = document.getElementById('faturas-container');
  container.innerHTML = '';

  state.faturas.forEach(f => {
    const total = f.rows.reduce((s,r) => s + (parseFloat(r.value)||0), 0);

    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-header';

    const titleWrap = document.createElement('div');
    titleWrap.style.display = 'flex'; titleWrap.style.alignItems = 'center'; titleWrap.style.gap = '8px';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'profile-name-input card-title';
    nameInput.style.fontSize = '14px';
    nameInput.style.fontWeight = '600';
    nameInput.value = f.name;
    nameInput.oninput = e => { f.name = e.target.value; saveState(); };

    const totalEl = document.createElement('div');
    totalEl.className = 'card-total';
    totalEl.id = 'total-' + f.id;
    totalEl.textContent = fmt(total);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn btn-danger btn-sm';
    removeBtn.textContent = '✕ Remover';
    removeBtn.onclick = () => removeFatura(f.id);

    titleWrap.appendChild(nameInput);
    header.appendChild(titleWrap);
    const rightHeader = document.createElement('div');
    rightHeader.style.display = 'flex'; rightHeader.style.gap = '12px'; rightHeader.style.alignItems = 'center';
    rightHeader.appendChild(totalEl);
    rightHeader.appendChild(removeBtn);
    header.appendChild(rightHeader);
    card.appendChild(header);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      <th>Data</th>
      <th>Descrição</th>
      <th>Parcelas</th>
      <th>Valor</th>
      <th>Perfil responsável</th>
      <th>Categoria</th>
      <th></th>
    </tr></thead>`;

    const tbody = document.createElement('tbody');

    if (f.rows.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="7"><div class="empty">Nenhum gasto ainda. Clique em "Adicionar linha".</div></td>`;
      tbody.appendChild(tr);
    } else {
      f.rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.dataset.rid = r.id;

        const tdDate = document.createElement('td');
        const inDate = document.createElement('input');
        inDate.type = 'date'; inDate.value = r.date;
        inDate.onchange = e => updateRow(f.id, r.id, 'date', e.target.value);
        tdDate.appendChild(inDate);

        const tdName = document.createElement('td');
        tdName.style.minWidth = '160px';
        const inName = document.createElement('input');
        inName.type = 'text'; inName.value = r.name; inName.placeholder = 'Descrição';
        inName.oninput = e => updateRow(f.id, r.id, 'name', e.target.value);
        tdName.appendChild(inName);

        const tdParc = document.createElement('td');
        tdParc.style.maxWidth = '80px';
        const inParc = document.createElement('input');
        inParc.type = 'text'; inParc.value = r.parcelas; inParc.placeholder = '1/1';
        inParc.oninput = e => updateRow(f.id, r.id, 'parcelas', e.target.value);
        tdParc.appendChild(inParc);

        const tdVal = document.createElement('td');
        tdVal.style.maxWidth = '110px';
        const inVal = document.createElement('input');
        inVal.type = 'number'; inVal.value = r.value; inVal.placeholder = '0,00'; inVal.step = '0.01';
        // FIX: use oninput but do NOT re-render; just update state and totals
        inVal.oninput = e => {
          updateRow(f.id, r.id, 'value', e.target.value);
          if (document.getElementById('tab-resumo').classList.contains('active')) renderPerfis();
          if (document.getElementById('tab-resumo').classList.contains('active')) renderSaldo();
        };
        tdVal.appendChild(inVal);

        const tdProfile = document.createElement('td');
        const chips = profileChips(r.profileIdx, newIdx => {
          r.profileIdx = newIdx;
          if (newIdx !== 4) r.category = null;
          saveState();
          const newChips = profileChips(newIdx, arguments.callee);
          tdProfile.replaceChild(newChips, tdProfile.firstChild);
          const newCatCell = buildCategoryCell(r, f.id);
          tdCat.innerHTML = '';
          tdCat.appendChild(newCatCell);
          if (document.getElementById('tab-resumo').classList.contains('active')) renderPerfis();
          if (document.getElementById('tab-resumo').classList.contains('active')) renderSaldo();
        });
        tdProfile.appendChild(chips);

        const tdCat = document.createElement('td');
        tdCat.appendChild(buildCategoryCell(r, f.id));

        const tdDel = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-danger btn-sm';
        delBtn.innerHTML = '🗑';
        delBtn.title = 'Remover linha';
        delBtn.onclick = () => removeRow(f.id, r.id);
        tdDel.appendChild(delBtn);

        tr.append(tdDate, tdName, tdParc, tdVal, tdProfile, tdCat, tdDel);
        tbody.appendChild(tr);
      });
    }

    table.appendChild(tbody);
    wrap.appendChild(table);

    const addBar = document.createElement('div');
    addBar.className = 'add-row-bar';
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-ghost btn-sm';
    addBtn.textContent = '＋ Adicionar linha';
    addBtn.onclick = () => addRow(f.id);
    addBar.appendChild(addBtn);

    // Corpo retrátil (tabela + botão de adicionar linha) — vem RECOLHIDO por
    // padrão; só fica aberto se o usuário explicitamente expandir (=== false)
    const body = document.createElement('div');
    body.id = 'fatura-body-' + f.id;
    body.appendChild(wrap);
    body.appendChild(addBar);
    if (_collapsedFaturas[f.id] !== false) body.style.display = 'none';
    card.appendChild(body);

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn btn-ghost btn-sm';
    toggleBtn.textContent = _collapsedFaturas[f.id] !== false ? '▸' : '▾';
    toggleBtn.title = 'Recolher/expandir';
    toggleBtn.onclick = () => {
      _collapsedFaturas[f.id] = _collapsedFaturas[f.id] === false ? true : false;
      renderFaturas();
    };
    rightHeader.insertBefore(toggleBtn, removeBtn);

    container.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════
//  PERFIS
// ══════════════════════════════════════════════════════
function getAllRowsByProfile(pIdx) {
  const rows = [];
  state.faturas.forEach(f => {
    f.rows.forEach(r => {
      if (r.profileIdx === pIdx && (parseFloat(r.value)||0) !== 0) {
        rows.push({ ...r, faturaName: f.name });
      }
    });
  });
  // Include PIX transactions assigned to this profile
  (state.pixRows || []).forEach(p => {
    if (p.profileIdx === pIdx && (parseFloat(p.value)||0) !== 0) {
      rows.push({ id: p.id, date: p.date, name: p.desc, parcelas: '', value: p.value, profileIdx: pIdx, category: null, faturaName: 'Pix' });
    }
  });
  return rows;
}

function renderPerfis() {
  const container = document.getElementById('perfis-summary');
  container.innerHTML = '';

  const totalProfiles = state.profiles.length; // 6

  getActiveProfiles().forEach(({ name: pName, idx: pIdx }) => {
    const rows = getAllRowsByProfile(pIdx);
    const total = rows.reduce((s,r) => s + (parseFloat(r.value)||0), 0);
    const hasCat = !!getProfileCategories(pIdx);

    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-header';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-title';
    const dot = document.createElement('span');
    dot.style.width = '10px'; dot.style.height = '10px';
    dot.style.borderRadius = '50%';
    dot.style.background = getProfileColor(pIdx);
    dot.style.display = 'inline-block';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'profile-name-input';
    nameInput.style.fontSize = '14px';
    nameInput.style.fontWeight = '600';
    nameInput.value = pName;
    nameInput.oninput = e => {
      state.profiles[pIdx] = e.target.value;
      saveState();
    };

    nameEl.appendChild(dot);
    nameEl.appendChild(nameInput);

    const totalEl = document.createElement('div');
    totalEl.className = 'card-total';
    // Multiply entradas (total) by -1 to flip sign display
    const displayTotal = -total;
    totalEl.textContent = fmt(Math.abs(displayTotal));
    totalEl.style.color = displayTotal >= 0 ? 'var(--accent2)' : 'var(--danger)';

    header.appendChild(nameEl);
    header.appendChild(totalEl);
    card.appendChild(header);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';

    const table = document.createElement('table');
    table.className = 'dyn-table';
    table.innerHTML = `<thead><tr>
      <th>Fatura</th><th>Data</th><th>Descrição</th><th>Parcelas</th><th>Valor</th>${hasCat ? '<th>Categoria</th>' : ''}
    </tr></thead>`;

    const tbody = document.createElement('tbody');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${hasCat ? 6 : 5}"><div class="empty">Nenhum gasto atribuído a este perfil.</div></td></tr>`;
    } else {
      rows.forEach(r => {
        const tr = document.createElement('tr');
        const cat = hasCat ? (r.category || '—') : '';
        const catCell = hasCat ? `<td><span class="cat-chip selected" style="pointer-events:none">${cat}</span></td>` : '';
        // Multiply value by -1
        const dispVal = -(parseFloat(r.value)||0);
        tr.innerHTML = `
          <td>${r.faturaName}</td>
          <td>${r.date || '—'}</td>
          <td>${r.name || '—'}</td>
          <td>${r.parcelas || '—'}</td>
          <td class="val-cell ${dispVal >= 0 ? 'positive' : 'negative'}">${dispVal >= 0 ? '+' : ''}${fmt(Math.abs(dispVal))}</td>
          ${catCell}
        `;
        tbody.appendChild(tr);
      });
    }

    const tfoot = document.createElement('tfoot');
    const totalDisplay = -total;
    tfoot.innerHTML = `<tr>
      <td colspan="${hasCat ? 5 : 4}" style="color:var(--muted);font-size:12px">Total</td>
      <td class="val-cell" style="color:${totalDisplay >= 0 ? 'var(--accent2)' : 'var(--danger)'}">${totalDisplay >= 0 ? '+' : ''}${fmt(Math.abs(totalDisplay))}</td>
    </tr>`;

    table.appendChild(tbody);
    table.appendChild(tfoot);
    wrap.appendChild(table);

    const body = document.createElement('div');
    body.id = 'profile-body-' + pIdx;

    body.appendChild(wrap);

    if (hasCat && rows.length > 0) {
      const catTotals = {};
      rows.forEach(r => {
        const cat = r.category || '—';
        catTotals[cat] = (catTotals[cat] || 0) + (parseFloat(r.value)||0);
      });

      const catDiv = document.createElement('div');
      catDiv.style.borderTop = '1px solid var(--border)';
      catDiv.style.padding = '12px 14px 4px';
      catDiv.innerHTML = `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">Gastos por Categoria</div>`;

      Object.entries(catTotals).forEach(([cat, val]) => {
        if (val !== 0) {
          const row = document.createElement('div');
          row.className = 'cat-total-row';
          // Multiply by -1
          const dispVal = -val;
          row.innerHTML = `<span class="cat-total-label">${cat}</span><span class="val-cell ${dispVal >= 0 ? 'positive' : 'negative'}">${dispVal >= 0 ? '+' : '− '}${fmt(Math.abs(dispVal))}</span>`;
          catDiv.appendChild(row);
        }
      });
      body.appendChild(catDiv);
    }

    if (_collapsedProfiles[pIdx]) body.style.display = 'none';
    card.appendChild(body);

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn btn-ghost btn-sm';
    toggleBtn.textContent = _collapsedProfiles[pIdx] ? '▸' : '▾';
    toggleBtn.title = 'Recolher/expandir';
    toggleBtn.onclick = () => {
      _collapsedProfiles[pIdx] = !_collapsedProfiles[pIdx];
      renderPerfis();
    };
    header.insertBefore(toggleBtn, totalEl);

    container.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════
//  PAGAMENTOS
// ══════════════════════════════════════════════════════
function addPayment(pIdx) {
  const dateEl = document.getElementById('pay-date-'+pIdx);
  const descEl = document.getElementById('pay-desc-'+pIdx);
  const valEl  = document.getElementById('pay-val-'+pIdx);

  const date = dateEl.value;
  const desc = descEl.value.trim() || 'Pagamento';
  const value = parseFloat(valEl.value) || 0;

  if (value <= 0) { alert('Informe um valor válido.'); return; }

  state.payments.push({ id: genId(), profileIdx: pIdx, desc, value, date });
  saveState();
  dateEl.value = '';
  descEl.value = '';
  valEl.value = '';
  renderPagamentos();
  if (document.getElementById('tab-resumo').classList.contains('active')) renderSaldo();
}

function removePayment(id) {
  state.payments = state.payments.filter(p => p.id !== id);
  saveState();
  renderPagamentos();
  if (document.getElementById('tab-resumo').classList.contains('active')) renderSaldo();
}

function renderPagamentos() {
  const container = document.getElementById('pagamentos-container');
  container.innerHTML = '';

  getActiveProfiles().forEach(({ name: pName, idx: pIdx }) => {
    const pays = state.payments.filter(p => p.profileIdx === pIdx);
    const totalPaid = pays.reduce((s,p) => s + p.value, 0);

    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-header';
    const dot = `<span style="width:10px;height:10px;border-radius:50%;background:${getProfileColor(pIdx)};display:inline-block;"></span>`;
    header.innerHTML = `<div class="card-title">${dot} ${pName}</div>
      <div class="card-total positive">${fmt(totalPaid)} pagos</div>`;
    card.appendChild(header);

    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th></th></tr></thead>`;

    const tbody = document.createElement('tbody');
    if (pays.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty">Nenhum pagamento registrado.</div></td></tr>`;
    } else {
      pays.forEach(p => {
        const tr = document.createElement('tr');
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-danger btn-sm';
        delBtn.innerHTML = '🗑';
        delBtn.onclick = () => removePayment(p.id);

        const tdDel = document.createElement('td');
        tdDel.appendChild(delBtn);

        tr.innerHTML = `<td>${p.date||'—'}</td><td>${p.desc}</td><td class="val-cell positive">${fmt(p.value)}</td>`;
        tr.appendChild(tdDel);
        tbody.appendChild(tr);
      });
    }

    table.appendChild(tbody);
    wrap.appendChild(table);
    card.appendChild(wrap);

    const addBar = document.createElement('div');
    addBar.className = 'payment-add-row';

    const inDate = document.createElement('input');
    inDate.type = 'date'; inDate.id = 'pay-date-'+pIdx;

    const inDesc = document.createElement('input');
    inDesc.type = 'text'; inDesc.id = 'pay-desc-'+pIdx; inDesc.placeholder = 'Descrição';

    const inVal = document.createElement('input');
    inVal.type = 'number'; inVal.id = 'pay-val-'+pIdx; inVal.placeholder = 'Valor'; inVal.step = '0.01';

    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-primary btn-sm';
    addBtn.textContent = '＋ Registrar';
    addBtn.onclick = () => addPayment(pIdx);

    addBar.append(inDate, inDesc, inVal, addBtn);
    card.appendChild(addBar);
    container.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════
//  SALDO FINAL
// ══════════════════════════════════════════════════════
function fmtSaldo(val) {
  return _saldoVisible ? fmt(val) : '••••';
}

function renderSaldo() {
  const container = document.getElementById('saldo-container');
  container.innerHTML = '';

  const toggleWrap = document.createElement('div');
  toggleWrap.style.cssText = 'display:flex;justify-content:flex-end;margin-bottom:8px;';
  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'btn btn-ghost btn-sm';
  toggleBtn.textContent = _saldoVisible ? '👁️ Ocultar valores' : '🙈 Mostrar valores';
  toggleBtn.onclick = () => { _saldoVisible = !_saldoVisible; renderSaldo(); };
  toggleWrap.appendChild(toggleBtn);
  container.appendChild(toggleWrap);

  const grid = document.createElement('div');
  grid.className = 'profile-grid';

  getActiveProfiles().forEach(({ name: pName, idx: pIdx }) => {
    const rows = getAllRowsByProfile(pIdx);
    const totalGastos = rows.reduce((s,r) => s + (parseFloat(r.value)||0), 0);
    const pays = state.payments.filter(p => p.profileIdx === pIdx);
    const totalPago = pays.reduce((s,p) => s + p.value, 0);
    const saldo = totalPago - totalGastos;

    const pCard = document.createElement('div');
    pCard.className = 'profile-card';
    pCard.dataset.p = pIdx;

    const nameDiv = document.createElement('div');
    nameDiv.className = 'profile-card-name';
    nameDiv.textContent = pName;

    const r1 = document.createElement('div'); r1.className = 'profile-card-row';
    r1.innerHTML = `<span class="label">Total de gastos</span><span class="val-cell negative">${_saldoVisible?'−':''}${fmtSaldo(totalGastos)}</span>`;

    const r2 = document.createElement('div'); r2.className = 'profile-card-row';
    r2.innerHTML = `<span class="label">Total pago</span><span class="val-cell positive">${_saldoVisible?'+':''}${fmtSaldo(totalPago)}</span>`;

    const r3 = document.createElement('div'); r3.className = 'profile-card-row';
    const saldoClass = saldo >= 0 ? 'positive' : 'negative';
    const saldoSign = (_saldoVisible && saldo >= 0) ? '+' : '';
    r3.innerHTML = `<span class="label" style="font-weight:600">Saldo</span>
      <span class="profile-card-final ${saldoClass}">${saldoSign}${fmtSaldo(saldo)}</span>`;

    pCard.append(nameDiv, r1, r2, r3);
    grid.appendChild(pCard);
  });

  container.appendChild(grid);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-header"><div class="card-title">📋 Resumo Geral</div></div>`;

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';

  const table = document.createElement('table');
  table.innerHTML = `<thead><tr>
    <th>Perfil</th><th>Total Gastos</th><th>Total Pago</th><th>Saldo</th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');
  let gtGastos = 0, gtPago = 0;

  getActiveProfiles().forEach(({ name: pName, idx: pIdx }) => {
    const rows = getAllRowsByProfile(pIdx);
    const tg = rows.reduce((s,r) => s + (parseFloat(r.value)||0), 0);
    const pays = state.payments.filter(p => p.profileIdx === pIdx);
    const tp = pays.reduce((s,p) => s + p.value, 0);
    const sl = tp - tg;
    gtGastos += tg; gtPago += tp;

    const tr = document.createElement('tr');
    const dot = `<span style="width:8px;height:8px;border-radius:50%;background:${getProfileColor(pIdx)};display:inline-block;margin-right:8px;"></span>`;
    const sc = sl >= 0 ? 'positive' : 'negative';
    const ss = (_saldoVisible && sl >= 0) ? '+' : '';
    tr.innerHTML = `
      <td>${dot}${pName}</td>
      <td class="val-cell negative">${_saldoVisible?'−':''}${fmtSaldo(tg)}</td>
      <td class="val-cell positive">${_saldoVisible?'+':''}${fmtSaldo(tp)}</td>
      <td class="val-cell ${sc}">${ss}${fmtSaldo(sl)}</td>
    `;
    tbody.appendChild(tr);
  });

  const tfoot = document.createElement('tfoot');
  const gtSaldo = gtPago - gtGastos;
  const gtClass = gtSaldo >= 0 ? 'positive' : 'negative';
  const gtSign = (_saldoVisible && gtSaldo >= 0) ? '+' : '';
  tfoot.innerHTML = `<tr>
    <td>Total Geral</td>
    <td class="val-cell negative">${_saldoVisible?'−':''}${fmtSaldo(gtGastos)}</td>
    <td class="val-cell positive">${_saldoVisible?'+':''}${fmtSaldo(gtPago)}</td>
    <td class="val-cell ${gtClass}">${gtSign}${fmtSaldo(gtSaldo)}</td>
  </tr>`;

  table.appendChild(tbody);
  table.appendChild(tfoot);
  wrap.appendChild(table);
  card.appendChild(wrap);
  container.appendChild(card);
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
renderFaturas();
renderPix();
</script>
