<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f0ea;
    --surface: #ffffff;
    --surface2: #f0ebe3;
    --border: #ddd5c8;
    --accent: #8b6f47;
    --accent2: #5a7a5c;
    --danger: #b85450;
    --warn: #c9954a;
    --text: #2e2520;
    --muted: #8a7d72;
    --card-radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.5px;
    padding: 16px 0;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .logo span { color: var(--text); }

  nav { display: flex; gap: 4px; flex: 1; overflow-x: auto; }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all .15s;
  }

  nav button:hover { color: var(--text); background: var(--surface2); }
  nav button.active { color: var(--accent); background: rgba(139,111,71,.12); }

  .tab { display: none; padding: 24px; }
  .tab.active { display: block; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(139,111,71,.15);
    color: var(--accent);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-title {
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px;
    font-weight: 700;
    color: var(--accent2);
    white-space: nowrap;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,48,69,.5);
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,.02); }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 10px;
    width: 100%;
    outline: none;
    transition: border-color .15s;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  input[type="date"]:focus,
  select:focus { border-color: var(--accent); }

  input[type="date"] { min-width: 130px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #a08060; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; padding: 4px 8px; }
  .btn-danger:hover { background: rgba(255,107,107,.1); border-color: var(--danger); }

  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .profile-select {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    min-width: 160px;
  }

  .chip {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all .15s;
    opacity: .45;
    white-space: nowrap;
  }

  .chip.selected { opacity: 1; }

  .chip[data-p="0"] { color: #8b6f47; border-color: #8b6f47; }
  .chip[data-p="0"].selected { background: rgba(139,111,71,.2); }
  .chip[data-p="1"] { color: #5a7a5c; border-color: #5a7a5c; }
  .chip[data-p="1"].selected { background: rgba(90,122,92,.2); }
  .chip[data-p="2"] { color: #b85450; border-color: #b85450; }
  .chip[data-p="2"].selected { background: rgba(184,84,80,.2); }
  .chip[data-p="3"] { color: #c9954a; border-color: #c9954a; }
  .chip[data-p="3"].selected { background: rgba(201,149,74,.2); }
  .chip[data-p="4"] { color: #7a6b8a; border-color: #7a6b8a; }
  .chip[data-p="4"].selected { background: rgba(122,107,138,.2); }
  .chip[data-p="5"] { color: #f97316; border-color: #f97316; }
  .chip[data-p="5"].selected { background: rgba(249,115,22,.2); }
  .chip[data-p="6"] { color: #06b6d4; border-color: #06b6d4; }
  .chip[data-p="6"].selected { background: rgba(6,182,212,.2); }

  .profile-card[data-p="5"]::before { background: #f97316; }
  .profile-card[data-p="6"]::before { background: #4a8a8a; }
  .profile-card[data-p="5"] .profile-card-name { color: #c07040; }
  .profile-card[data-p="6"] .profile-card-name { color: #4a8a8a; }
  .chip[data-p="5"] { color: #c07040; border-color: #c07040; }
  .chip[data-p="5"].selected { background: rgba(192,112,64,.2); }
  .chip[data-p="6"] { color: #4a8a8a; border-color: #4a8a8a; }
  .chip[data-p="6"].selected { background: rgba(74,138,138,.2); }
  .chip[data-p="7"] { color: #7a9a40; border-color: #7a9a40; }
  .chip[data-p="7"].selected { background: rgba(122,154,64,.2); }
  .chip[data-p="8"] { color: #9a6090; border-color: #9a6090; }
  .chip[data-p="8"].selected { background: rgba(154,96,144,.2); }
  .chip[data-p="9"] { color: #b06070; border-color: #b06070; }
  .chip[data-p="9"].selected { background: rgba(176,96,112,.2); }

  .profile-card[data-p="5"]::before { background: #c07040; }
  .profile-card[data-p="6"]::before { background: #4a8a8a; }
  .profile-card[data-p="7"]::before { background: #7a9a40; }
  .profile-card[data-p="8"]::before { background: #9a6090; }
  .profile-card[data-p="9"]::before { background: #b06070; }
  .profile-card[data-p="5"] .profile-card-name { color: #c07040; }
  .profile-card[data-p="6"] .profile-card-name { color: #4a8a8a; }
  .profile-card[data-p="7"] .profile-card-name { color: #7a9a40; }
  .profile-card[data-p="8"] .profile-card-name { color: #9a6090; }
  .profile-card[data-p="9"] .profile-card-name { color: #b06070; }

  .val-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
  }

  .negative { color: var(--danger) !important; }
  .positive { color: var(--accent2) !important; }

  tfoot td {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    font-weight: 600;
    background: var(--surface2);
    font-family: 'JetBrains Mono', monospace;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .profile-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .profile-card[data-p="0"]::before { background: #8b6f47; }
  .profile-card[data-p="1"]::before { background: #5a7a5c; }
  .profile-card[data-p="2"]::before { background: #b85450; }
  .profile-card[data-p="3"]::before { background: #c9954a; }
  .profile-card[data-p="4"]::before { background: #7a6b8a; }
  .profile-card[data-p="5"]::before { background: #c07040; }
  .profile-card[data-p="6"]::before { background: #4a8a8a; }
  .profile-card[data-p="7"]::before { background: #7a9a40; }
  .profile-card[data-p="8"]::before { background: #9a6090; }
  .profile-card[data-p="9"]::before { background: #b06070; }

  .profile-card-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .profile-card[data-p="0"] .profile-card-name { color: #8b6f47; }
  .profile-card[data-p="1"] .profile-card-name { color: #5a7a5c; }
  .profile-card[data-p="2"] .profile-card-name { color: #b85450; }
  .profile-card[data-p="3"] .profile-card-name { color: #c9954a; }
  .profile-card[data-p="4"] .profile-card-name { color: #7a6b8a; }
  .profile-card[data-p="5"] .profile-card-name { color: #c07040; }
  .profile-card[data-p="6"] .profile-card-name { color: #4a8a8a; }
  .profile-card[data-p="7"] .profile-card-name { color: #7a9a40; }
  .profile-card[data-p="8"] .profile-card-name { color: #9a6090; }
  .profile-card[data-p="9"] .profile-card-name { color: #b06070; }

  .profile-card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .profile-card-row:last-child { border-bottom: none; }
  .profile-card-row .label { color: var(--muted); }

  .profile-card-final {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    padding-top: 4px;
  }

  .dyn-table thead th:first-child,
  .dyn-table tbody td:first-child { color: var(--muted); font-size: 11px; }

  .payment-add-row {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .payment-add-row input,
  .payment-add-row select {
    flex: 1;
    min-width: 120px;
  }

  .empty {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

  .profile-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    color: inherit;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    width: auto;
    padding: 2px 4px;
  }

  .profile-name-input:focus { border-bottom-color: var(--accent); outline: none; }

  .add-row-bar {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  select option { background: #f0ebe3; }

  .category-select {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    min-width: 220px;
  }

  .cat-chip {
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid #7a6b8a;
    color: #7a6b8a;
    transition: all .15s;
    opacity: .4;
    white-space: nowrap;
  }

  .cat-chip.selected {
    opacity: 1;
    background: rgba(122,107,138,.2);
  }

  .balanco-section {
    margin-bottom: 20px;
  }

  .balanco-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Compact "balões" inside Balanço Mensal tab */
  #tab-balanco .card {
    margin-bottom: 14px;
    border-radius: 8px;
  }
  #tab-balanco .card-header {
    padding: 8px 12px;
  }
  #tab-balanco .card-title {
    font-size: 12px;
    gap: 6px;
  }
  #tab-balanco .card-total {
    font-size: 13px;
  }
  #tab-balanco table th,
  #tab-balanco table td {
    padding: 6px 10px;
    font-size: 12px;
  }
  #tab-balanco .profile-manager-card {
    padding: 8px !important;
    margin-bottom: 6px !important;
  }
  #tab-balanco .balanco-add-btn {
    padding: 6px 10px;
  }
  .balanco-add-btn {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }
  #saldo-builder-body > div:last-child {
    border-bottom: none;
  }
  #saldo-builder-body button:disabled {
    opacity: 0.2;
  }

  .saldo-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-top: 2px solid var(--accent);
    font-weight: 700;
    font-size: 15px;
  }

  .saldo-row .saldo-label { color: var(--text); }

  .balanco-editable-row td input[type="number"] {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 2px 4px;
    width: 120px;
    outline: none;
  }

  .balanco-editable-row td input[type="number"]:focus {
    border-bottom-color: var(--accent);
  }

  .balanco-editable-row td input[type="text"] {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    color: var(--text);
    font-size: 13px;
    padding: 2px 4px;
    outline: none;
  }

  .balanco-editable-row td input[type="text"]:focus {
    border-bottom-color: var(--accent);
  }

  .balanco-add-btn {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .cat-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(42,48,69,.4);
    font-size: 13px;
  }

  .cat-total-row:last-child { border-bottom: none; }
  .cat-total-label { color: var(--muted); }

  .cat-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    margin-bottom: 16px;
  }

  /* Profile management styles */
  .profiles-manager {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .profile-manager-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid rgba(42,48,69,.5);
  }

  .profile-manager-row:last-child { border-bottom: none; }

  .profile-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .profile-manager-name {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 4px 6px;
    outline: none;
  }

  .profile-manager-name:focus { border-bottom-color: var(--accent); }

  /* Referencia table */
  .referencia-value-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
  }

  .referencia-remaining {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .lancamento-diff-positive { color: var(--accent2); }
  .lancamento-diff-negative { color: var(--danger); }
  .lancamento-diff-neutral { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">💳 <span>Controle</span>Financeiro</div>
  <nav id="nav">
    <button class="active" onclick="showTab('faturas')">Faturas</button>
    <button onclick="showTab('resumo')">Resumo &amp; Perfis</button>
    <button onclick="showTab('pagamentos')">Pagamentos</button>
    <button onclick="showTab('balanco')">Balanço Mensal</button>
  </nav>
</header>

<!-- TAB 1 — FATURAS -->
<div id="tab-faturas" class="tab active">
  <div id="faturas-container"></div>
  <div style="padding:0 0 24px">
    <button class="btn btn-ghost" onclick="addFatura()">＋ Nova Fatura</button>
  </div>
</div>

<!-- TAB 2 — RESUMO & PERFIS (Saldo Final + Resumo por Perfil + Gerenciar Perfis) -->
<div id="tab-resumo" class="tab">
  <div class="section-head">
    <div class="section-title">⚖️ Saldo Final por Perfil</div>
  </div>
  <div id="saldo-container"></div>

  <div class="section-head" style="margin-top:16px">
    <div class="section-title">📊 Gastos por Perfil</div>
  </div>
  <div id="perfis-summary"></div>

  <div class="section-head" style="margin-top:16px">
    <div class="section-title">👤 Gerenciar Perfis</div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Perfis ativos</div>
      <button class="btn btn-ghost btn-sm" id="btn-add-profile" onclick="addProfile()">＋ Adicionar perfil</button>
    </div>
    <div id="profiles-manager-body"></div>
  </div>
</div>

<!-- TAB 3 — PAGAMENTOS -->
<div id="tab-pagamentos" class="tab">
  <div class="section-head">
    <div class="section-title">💸 Registro de Pagamentos</div>
  </div>
  <div id="pagamentos-container"></div>
</div>

<!-- TAB 5 — BALANÇO MENSAL -->
<div id="tab-balanco" class="tab">
  <div class="section-head">
    <div class="section-title">📅 Balanço Mensal</div>
  </div>

  <div id="balanco-tables-container"></div>

  <div style="padding:4px 0 24px">
    <button class="btn btn-ghost btn-sm" onclick="addBalancoTable()">＋ Nova tabela</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════
const PROFILE_COLORS = ['#8b6f47','#5a7a5c','#b85450','#c9954a','#7a6b8a','#c07040','#4a8a8a','#7a9a40','#9a6090','#b06070'];
function getProfileColor(idx) {
  return PROFILE_COLORS[idx % PROFILE_COLORS.length];
}

// Default categories per profile index (used only for brand-new profiles / fresh state)
const DEFAULT_PROFILE_CATEGORIES = {
  3: ['Pedágio','Combustível','Manutenção','Seguro'],
  4: ['Academia','Restaurantes','Salão','Uber','Dieta','Lista de desejos','Parcelado','Outros'],
  5: ['Academia','Restaurantes','Salão','Uber','Dieta','Lista de desejos','Parcelado','Outros']
};
const CATEGORIES = ['Academia','Restaurantes','Salão','Uber','Dieta','Lista de desejos','Parcelado','Outros'];

// ══════════════════════════════════════════════════════
//  NUVEM (Supabase) — mesma sessão/projeto do app principal
// ══════════════════════════════════════════════════════
// Recebe a URL/chave do LifePlan via query string, compartilhando a sessão
// de login já feita, e sincroniza faturas/perfis/lançamentos na tabela
// "finance_data" (uma linha por usuário).
const __params = new URLSearchParams(window.location.search);
const SUPABASE_URL = __params.get('sbUrl') || '';
const SUPABASE_KEY = __params.get('sbKey') || '';
let supa = null, currentUser = null;
if (SUPABASE_URL && SUPABASE_KEY) {
  supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

let state = loadState() || getDefaultState();

// Preferências de exibição (só na tela, não salvas na nuvem): quais faturas
// e cards de perfil estão recolhidos, e se o saldo por perfil está visível.
let _collapsedFaturas = {};

let _saldoVisible = true;

let __cfSaveTimer = null;
function flushCloudSave() {
  if (!supa || !currentUser) return;
  supa.from('finance_data').upsert({
    user_id: currentUser.id, data: state, updated_at: new Date().toISOString()
  }).then(({error}) => { if (error) console.error('Erro ao salvar finanças na nuvem:', error); });
}
function scheduleCloudSave() {
  if (!supa || !currentUser) return;
  clearTimeout(__cfSaveTimer);
  __cfSaveTimer = setTimeout(flushCloudSave, 250);
}
// Rede de segurança: como esta página roda dentro de um iframe (não um
// componente React), não existe um aviso confiável de "estou prestes a ser
// removida" quando o usuário troca de aba no app principal. Isso tenta
// forçar o envio se o navegador perceber a aba escondendo/fechando.
window.addEventListener('pagehide', () => { if (__cfSaveTimer) { clearTimeout(__cfSaveTimer); flushCloudSave(); } });
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden' && __cfSaveTimer) { clearTimeout(__cfSaveTimer); flushCloudSave(); } });

async function loadFinanceFromCloud() {
  if (!supa) return;
  try {
    const { data: { session } } = await supa.auth.getSession();
    if (!session?.user) return;
    currentUser = session.user;
    const { data: row } = await supa.from('finance_data').select('data').eq('user_id', currentUser.id).maybeSingle();
    if (row?.data) {
      const cloudJson = JSON.stringify(row.data);
      const localJson = JSON.stringify(state);
      if (cloudJson !== localJson && !sessionStorage.getItem('cf_cloud_synced')) {
        // Dados da nuvem são diferentes do que já carregou localmente:
        // aplica e recarrega uma única vez pra tudo renderizar do zero certinho.
        localStorage.setItem('cf_state', cloudJson);
        sessionStorage.setItem('cf_cloud_synced', '1');
        location.reload();
        return;
      }
    }
  } catch (e) { console.error('Erro ao carregar finanças da nuvem:', e); }
}
loadFinanceFromCloud();

// usuário: essa tabela não deve mais aparecer na aba Balanço Mensal)

  state.balancoTables = state.balancoTables.filter(t => t.id !== 'saidas');
}

  // old state had 5 profiles; keep them all active
  state.activeProfiles = state.profiles.length;
}

// Ensure profiles array has 6 slots (new Perfil 4 at index 3, old profiles shift)
// Migration: if old state had exactly 5 profiles, insert new Perfil 4 at index 3
if (state.profiles.length === 5) {
  // Insert new Perfil 4 between old index 2 and 3
  state.profiles.splice(3, 0, 'Perfil 4');
  // Shift all row profileIdx: old 3 → 4, old 4 → 5 (and payments too)
  state.faturas.forEach(f => {
    f.rows.forEach(r => {
      if (r.profileIdx === 4) r.profileIdx = 5;
      else if (r.profileIdx === 3) r.profileIdx = 4;
    });
  });
  state.payments.forEach(p => {
    if (p.profileIdx === 4) p.profileIdx = 5;
    else if (p.profileIdx === 3) p.profileIdx = 4;
  });
}
while (state.profiles.length < 6) {
  state.profiles.push('Perfil ' + (state.profiles.length + 1));
}
// activeProfiles is now just an alias for profiles.length (kept for compatibility)

// Migrate / ensure profileCategories exists for every profile index

    state.profileCategories[idx] = DEFAULT_PROFILE_CATEGORIES[idx]
      ? [...DEFAULT_PROFILE_CATEGORIES[idx]]
      : [];
  }
});

function genId() { return Math.random().toString(36).slice(2,9); }

function saveState() {
  try { localStorage.setItem('cf_state', JSON.stringify(state)); } catch(e){}
  scheduleCloudSave();
}

function loadState() {
  try {
    const s = localStorage.getItem('cf_state');
    return s ? JSON.parse(s) : null;
  } catch(e){ return null; }
}

function shiftIndexedObjectInsert(obj, insertAt, defaultValue) {
  const result = {};
  Object.keys(obj || {}).forEach(k => {
    const ki = parseInt(k, 10);
    result[ki >= insertAt ? ki + 1 : ki] = obj[k];
  });
  result[insertAt] = defaultValue;
  return result;
}

function shiftIndexedObjectRemove(obj, idx) {
  const result = {};
  Object.keys(obj || {}).forEach(k => {
    const ki = parseInt(k, 10);
    if (ki === idx) return; // drop
    result[ki > idx ? ki - 1 : ki] = obj[k];
  });
  return result;
}

function addProfile() {
  // Insert new profile right before the last one (last profile stays last,
  // keeping its special categories)
  const insertAt = state.profiles.length - 1;
  state.profiles.splice(insertAt, 0, 'Perfil ' + state.profiles.length);
  // Shift profileIdx for any row/payment pointing at the old last profile
  const oldLastIdx = insertAt; // old last index before insertion
  state.faturas.forEach(f => {
    f.rows.forEach(r => {
      if (r.profileIdx === oldLastIdx) r.profileIdx = oldLastIdx + 1;
    });
  });
  state.payments.forEach(p => {
    if (p.profileIdx === oldLastIdx) p.profileIdx = oldLastIdx + 1;
  });
  // Shift profileCategories keys >= insertAt up by 1, new profile starts empty
  state.profileCategories = shiftIndexedObjectInsert(state.profileCategories, insertAt, []);
  // Shift entradasProfiles keys too, new profile defaults to included (true)
  state.entradasProfiles = shiftIndexedObjectInsert(state.entradasProfiles, insertAt, true);

  state.activeProfiles = state.profiles.length;
  saveState();
  renderBalanco();
  renderFaturas(); // refresh chips
}

function removeProfile(idx) {
  if (state.profiles.length <= 1) return;
  const lastIdx = state.profiles.length - 1;
  if (idx === lastIdx) return; // never remove the last profile (keeps special categories)

  // Remove rows/payments belonging to this profile (unassign them)
  state.faturas.forEach(f => {
    f.rows.forEach(r => {
      if (r.profileIdx === idx) r.profileIdx = null;
      else if (r.profileIdx > idx) r.profileIdx--;
    });
  });
  state.payments.forEach(p => {
    if (p.profileIdx === idx) p.profileIdx = null;
    else if (p.profileIdx > idx) p.profileIdx--;
  });

  // Shift profileCategories and entradasProfiles keys down, dropping the removed one
  state.profileCategories = shiftIndexedObjectRemove(state.profileCategories, idx);
  state.entradasProfiles = shiftIndexedObjectRemove(state.entradasProfiles, idx);

  state.profiles.splice(idx, 1);
  state.activeProfiles = state.profiles.length;
  saveState();
  renderBalanco();
  renderFaturas();
}

function addCategoryToProfile(pIdx) {
  if (!state.profileCategories[pIdx]) state.profileCategories[pIdx] = [];
  state.profileCategories[pIdx].push('Nova categoria');
  saveState();
  renderProfilesManager();
  renderBalanco();
  renderFaturas();
}

function removeCategoryFromProfile(pIdx, catIdx) {
  state.profileCategories[pIdx].splice(catIdx, 1);
  saveState();
  renderProfilesManager();
  renderBalanco();
  renderFaturas();
}

    });

    if (cats.length === 0) {
      const empty = document.createElement('span');
      empty.style.color = 'var(--muted)';
      empty.style.fontSize = '12px';
      empty.textContent = 'Nenhuma categoria — adicione abaixo.';
      catList.appendChild(empty);
    }

    catSection.appendChild(catList);

    const addCatBtn = document.createElement('button');
    addCatBtn.className = 'btn btn-sm';
    addCatBtn.textContent = '+ Categoria';
    addCatBtn.onclick = () => addCategoryToProfile(idx);
    catSection.appendChild(addCatBtn);

    card.appendChild(catSection);
    body.appendChild(card);
  });

  // Update add button
  const addBtn = document.getElementById('btn-add-profile');
  if (addBtn) addBtn.style.display = '';
}

// ── Helpers ──
function getBTById(id) {
  return state.balancoTables.find(t => t.id === id);
}

function getTableTotal(t) {
  // Returns computed numeric total for a table (for SALDO use)
  if (t.type === 'entradas') return computeEntradas().total;
  if (t.type === 'lancamentos') return 0; // informational, not summed unless sign != 0
  // custom: sum all columns of type 'number'
  const numCols = t.columns.filter(c => c.type === 'number');
  if (numCols.length === 0) return 0;
  // use first number column as "value"
  const valCol = numCols[0];
  return t.rows.reduce((s, r) => s + (parseFloat(r.values[valCol.id]) || 0), 0);
}

function computeEntradas() {
  let total = 0;
  const rows = [];
  getActiveProfiles()
    .filter(({ idx }) => state.entradasProfiles[idx] !== false)
    .forEach(({ name, idx }) => {
      const rws = getAllRowsByProfile(idx);
      const tg = rws.reduce((s, r) => s + (parseFloat(r.value) || 0), 0);
      const pays = state.payments.filter(p => p.profileIdx === idx);
      const tp = pays.reduce((s, p) => s + p.value, 0);
      const saldo = (tp - tg) * -1;
      total += saldo;
      rows.push({ name, idx, saldo });
    });
  return { total, rows };
}

// ── Table CRUD ──
function addBalancoTable() {
  const t = {
    id: genId(),
    name: 'Nova Tabela',
    icon: '📋',
    type: 'custom',
    columns: [
      { id: genId(), name: 'Nome', type: 'text' },
      { id: genId(), name: 'Valor (R$)', type: 'number' }
    ],
    rows: [],
    sign: -1,
    includeInSaldo: true
  };
  state.balancoTables.push(t);
  saveState();
  renderBalanco();
}

function removeBalancoTable(id) {
  state.balancoTables = state.balancoTables.filter(t => t.id !== id);
  saveState();
  renderBalanco();
}

function moveBalancoTable(id, dir) {
  const idx = state.balancoTables.findIndex(t => t.id === id);
  const target = idx + dir;
  if (target < 0 || target >= state.balancoTables.length) return;
  const tmp = state.balancoTables[idx];
  state.balancoTables[idx] = state.balancoTables[target];
  state.balancoTables[target] = tmp;
  saveState();
  renderBalanco();
}

function addTableRow(tableId) {
  const t = getBTById(tableId);
  if (!t) return;
  const row = { id: genId(), values: {} };
  t.columns.forEach(c => { row.values[c.id] = c.type === 'number' ? 0 : ''; });
  t.rows.push(row);
  saveState();
  renderBalanco();
}

function removeTableRow(tableId, rowId) {
  const t = getBTById(tableId);
  if (!t) return;
  t.rows = t.rows.filter(r => r.id !== rowId);
  saveState();
  renderBalanco();
}

function addTableColumn(tableId) {
  const t = getBTById(tableId);
  if (!t) return;
  const col = { id: genId(), name: 'Coluna', type: 'text' };
  t.columns.push(col);
  t.rows.forEach(r => { r.values[col.id] = ''; });
  saveState();
  renderBalanco();
}

function removeTableColumn(tableId, colId) {
  const t = getBTById(tableId);
  if (!t) return;
  t.columns = t.columns.filter(c => c.id !== colId);
  t.rows.forEach(r => { delete r.values[colId]; });
  saveState();
  renderBalanco();
}

// ── Main Render ──
function renderBalanco() {
  renderBalancoTables();
  renderSaldoBuilder();
}

function renderBalancoTables() {
  const container = document.getElementById('balanco-tables-container');
  if (!container) return;
  container.innerHTML = '';

  const totalTables = state.balancoTables.length;
  const saldoIdx = Math.min(state.saldoSectionIndex ?? 999, totalTables);

  state.balancoTables.forEach((t, tIdx) => {
    // Inject saldo card BEFORE this table if saldoIdx === tIdx
    if (tIdx === saldoIdx) {
      container.appendChild(buildSaldoSection(tIdx, totalTables));
    }
    container.appendChild(buildBalancoTableCard(t, tIdx, totalTables));
  });

  // If saldo is at the bottom (index >= totalTables)
  if (saldoIdx >= totalTables) {
    container.appendChild(buildSaldoSection(totalTables, totalTables));
  }
}

function buildSaldoSection(posIdx, totalTables) {
  const wrap = document.createElement('div');
  wrap.className = 'balanco-section';

  const titleRow = document.createElement('div');
  titleRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px';

  const label = document.createElement('div');
  label.className = 'balanco-section-title';
  label.textContent = '💡 Saldo do Mês';
  label.style.margin = '0';

  const moveUp = document.createElement('button');
  moveUp.className = 'btn btn-ghost btn-sm';
  moveUp.innerHTML = '↑'; moveUp.style.cssText = 'padding:2px 7px;font-size:12px';
  moveUp.disabled = posIdx === 0;
  moveUp.title = 'Mover para cima';
  moveUp.onclick = () => { state.saldoSectionIndex = Math.max(0, posIdx - 1); saveState(); renderBalanco(); };

  const moveDown = document.createElement('button');
  moveDown.className = 'btn btn-ghost btn-sm';
  moveDown.innerHTML = '↓'; moveDown.style.cssText = 'padding:2px 7px;font-size:12px';
  moveDown.disabled = posIdx >= totalTables;
  moveDown.title = 'Mover para baixo';
  moveDown.onclick = () => { state.saldoSectionIndex = Math.min(totalTables, posIdx + 1); saveState(); renderBalanco(); };

  titleRow.append(moveUp, moveDown, label);

  const card = document.createElement('div');
  card.id = 'balanco-saldo-row';
  card.className = 'card';
  card.style.overflow = 'hidden';

  wrap.append(titleRow, card);
  return wrap;
}

function buildBalancoTableCard(t, tIdx, totalTables) {
    const section = document.createElement('div');
    section.className = 'balanco-section';

    // ── Section header ──
    const titleRow = document.createElement('div');
    titleRow.style.display = 'flex';
    titleRow.style.alignItems = 'center';
    titleRow.style.gap = '6px';
    titleRow.style.marginBottom = '8px';

    const iconInput = document.createElement('input');
    iconInput.type = 'text'; iconInput.value = t.icon || '📋';
    iconInput.style.cssText = 'width:32px;background:transparent;border:none;font-size:16px;color:var(--text);text-align:center;cursor:pointer';
    iconInput.oninput = e => { t.icon = e.target.value; saveState(); };

    const nameInput = document.createElement('input');
    nameInput.type = 'text'; nameInput.value = t.name;
    nameInput.className = 'balanco-section-title';
    nameInput.style.cssText = 'background:transparent;border:none;flex:1;cursor:text;outline:none;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)';
    nameInput.oninput = e => { t.name = e.target.value; saveState(); renderSaldoBuilder(); };

    const moveUp = document.createElement('button');
    moveUp.className = 'btn btn-ghost btn-sm'; moveUp.textContent = '↑'; moveUp.title = 'Mover para cima';
    moveUp.style.padding = '2px 6px';
    moveUp.onclick = () => moveBalancoTable(t.id, -1);
    moveUp.disabled = tIdx === 0;

    const moveDown = document.createElement('button');
    moveDown.className = 'btn btn-ghost btn-sm'; moveDown.textContent = '↓'; moveDown.title = 'Mover para baixo';
    moveDown.style.padding = '2px 6px';
    moveDown.onclick = () => moveBalancoTable(t.id, 1);
    moveDown.disabled = tIdx === totalTables - 1;

    titleRow.append(iconInput, nameInput, moveUp, moveDown);

    // ── Sign toggle (include in saldo / exclude) ──
    const signBtn = document.createElement('button');
    signBtn.className = 'btn btn-ghost btn-sm';
    const signColors = { 1: 'var(--accent2)', '-1': 'var(--danger)', 0: 'var(--muted)' };
    const signLabels = { 1: '＋ Saldo', '-1': '− Saldo', 0: 'off' };
    signBtn.textContent = signLabels[t.sign] ?? 'off';
    signBtn.style.cssText = `font-size:10px;padding:2px 7px;color:${signColors[t.sign] ?? 'var(--muted)'};border-color:currentColor`;
    signBtn.title = 'Altera como esta tabela entra no Saldo';
    signBtn.onclick = () => {
      t.sign = t.sign === 1 ? -1 : t.sign === -1 ? 0 : 1;
      t.includeInSaldo = t.sign !== 0;
      saveState(); renderBalanco();
    };
    titleRow.appendChild(signBtn);

    // ── Delete button (only for custom tables, not built-ins) ──
    const builtIn = ['referencia','faturas','entradas','saidas','lancamentos','banco','pix_balanco'];
    if (!builtIn.includes(t.id)) {
      const delTableBtn = document.createElement('button');
      delTableBtn.className = 'btn btn-danger btn-sm'; delTableBtn.innerHTML = '🗑';
      delTableBtn.style.padding = '2px 6px';
      delTableBtn.onclick = () => removeBalancoTable(t.id);
      titleRow.appendChild(delTableBtn);
    }

    section.appendChild(titleRow);

    const card = document.createElement('div');
    card.className = 'card';

    // ── Table content by type ──
    if (t.type === 'entradas') {
      renderEntradasCard(card, t);
    } else if (t.type === 'lancamentos') {
      renderLancamentosCard(card, t);
    } else if (t.id === 'banco') {
      renderBancoCard(card, t);
    } else {
      renderCustomCard(card, t);
    }

    section.appendChild(card);
    return section;
}

  addBox.onmouseleave = () => { addBox.style.borderColor = 'var(--border)'; addBox.style.color = 'var(--muted)'; };
